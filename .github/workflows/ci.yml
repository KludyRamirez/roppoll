name: CI

# Run on every push to any branch and on all pull requests
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─── Backend: Build + Unit Tests ───────────────────────────────
  backend:
    name: Backend (ASP.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Unit tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: tests

  # ─── Frontend: Type-check + Lint + Unit Tests ──────────────────
  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Unit tests
        run: npm test
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

  # ─── E2E Tests ─────────────────────────────────────────────────
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [backend, frontend] # only run if unit tests pass

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: propl_user
          POSTGRES_PASSWORD: propl_secret
          POSTGRES_DB: propl
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: dotnet restore
        working-directory: backend

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Run database migrations
        run: dotnet ef database update
        working-directory: backend
        env:
          ConnectionStrings__Default: "Host=localhost;Database=propl;Username=propl_user;Password=propl_secret"

      - name: Start backend
        run: dotnet run --urls "http://localhost:5001" &
        working-directory: backend
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ConnectionStrings__Default: "Host=localhost;Database=propl;Username=propl_user;Password=propl_secret"
          Jwt__Key: "ci-test-jwt-secret-key-at-least-32-chars!"

      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5001/api/polls && break || sleep 1
          done

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Start frontend dev server
        run: npm run dev &
        working-directory: frontend

      - name: Wait for frontend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:5173 && break || sleep 1
          done

      - name: Run E2E tests
        run: npm run test:e2e
        working-directory: frontend
