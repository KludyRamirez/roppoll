name: CI

# Run on every push to any branch and on all pull requests
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ─── Backend: Build + Test ──────────────────────────────────
  backend:
    name: Backend (ASP.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restore dependencies
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Test
        # --no-build reuses the build above so we don't compile twice
        # If there are no test projects yet this still passes
        run: dotnet test --no-build --configuration Release --verbosity normal
        working-directory: backend

  # ─── Frontend: Type-check ───────────────────────────────────
  frontend:
    name: Frontend (React + TypeScript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend
